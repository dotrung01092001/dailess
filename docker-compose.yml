version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/dailess
      JWT_SECRET: change-me-please
      CLIENT_URL: http://localhost:3000
      UPLOAD_DIR: uploads
    ports:
      - "4000:4000"
    depends_on:
      - mongo

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data:
